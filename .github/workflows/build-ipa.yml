name: Build unsigned iOS IPA

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "Deployed Next.js URL the app will load"
        required: true
        default: "https://your-debt-tracker.vercel.app"
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45
    env:
      CAP_SERVER_URL: ${{ github.event.inputs.server_url || 'https://your-debt-tracker.vercel.app' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Add iOS platform
        run: |
          npx cap add ios
          npx cap sync ios
          echo "--- ios tree ---"
          find ios -maxdepth 4 -type f | head -50

      - name: Resolve SPM packages
        working-directory: ios/App
        run: |
          ls -la
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: List schemes
        working-directory: ios/App
        run: xcodebuild -list -project App.xcodeproj

      - name: Build archive (no signing)
        working-directory: ios/App
        shell: bash
        run: |
          set -eo pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/App.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            archive
          echo "--- archive contents ---"
          find build/App.xcarchive -maxdepth 5 -type d

      - name: Package unsigned IPA
        working-directory: ios/App
        shell: bash
        run: |
          set -eo pipefail
          APP_PATH=$(find build/App.xcarchive/Products/Applications -maxdepth 1 -name "*.app" -type d | head -1)
          echo "Using app: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build && zip -qr DebtTracker-unsigned.ipa Payload
          ls -lh DebtTracker-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebtTracker-unsigned-ipa
          path: ios/App/build/DebtTracker-unsigned.ipa
          retention-days: 30
